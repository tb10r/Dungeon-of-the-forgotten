<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companions - Dungeon of the Forgotten</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(208, 134, 72, 0.16), transparent 24%),
                linear-gradient(180deg, #150f0c 0%, #080606 100%);
            color: #f2e4c8;
        }

        .companions-shell {
            width: min(1280px, calc(100% - 32px));
            margin: 0 auto;
            padding: 24px 0 40px;
        }

        .companions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding: 18px 22px;
            border: 1px solid rgba(227, 181, 106, 0.24);
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(45, 28, 20, 0.96) 0%, rgba(18, 11, 8, 0.96) 100%);
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.32);
        }

        .header-copy h1 {
            margin: 0 0 8px;
            font-size: 2rem;
            color: #f3dcb0;
        }

        .header-copy p {
            margin: 0;
            color: #b8a186;
            line-height: 1.5;
        }

        .header-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
        }

        .level-chip,
        .nav-link,
        .action-btn,
        .weapon-btn,
        .skill-btn {
            border-radius: 999px;
            border: 1px solid rgba(227, 181, 106, 0.22);
            text-decoration: none;
            font-weight: 700;
        }

        .level-chip {
            padding: 11px 16px;
            background: linear-gradient(180deg, #e0b267 0%, #b26f35 100%);
            color: #1b120d;
            min-width: 96px;
            text-align: center;
        }

        .nav-link,
        .action-btn,
        .weapon-btn,
        .skill-btn {
            background: linear-gradient(180deg, #743324 0%, #451a12 100%);
            color: #f2e4c8;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .nav-link,
        .action-btn {
            padding: 11px 16px;
        }

        .action-btn,
        .weapon-btn,
        .skill-btn {
            font-size: 0.92rem;
        }

        .nav-link:hover,
        .action-btn:hover,
        .weapon-btn:hover,
        .skill-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.26);
        }

        .companions-grid {
            display: grid;
            gap: 18px;
        }

        .companion-card {
            border: 1px solid rgba(227, 181, 106, 0.18);
            border-radius: 20px;
            padding: 20px;
            background: linear-gradient(180deg, rgba(40, 25, 18, 0.94) 0%, rgba(17, 11, 8, 0.98) 100%);
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.24);
        }

        .companion-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            margin-bottom: 18px;
        }

        .companion-name {
            margin: 0;
            font-size: 1.5rem;
            color: #f3dcb0;
        }

        .companion-title {
            margin: 6px 0 0;
            color: #debf95;
            font-weight: 700;
        }

        .companion-description {
            margin: 10px 0 0;
            max-width: 760px;
            color: #b8a186;
            line-height: 1.55;
        }

        .companion-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }

        .meta-chip {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(242, 228, 200, 0.06);
            color: #f2e4c8;
            border: 1px solid rgba(227, 181, 106, 0.14);
            white-space: nowrap;
        }

        .meta-chip.points {
            background: linear-gradient(180deg, rgba(224, 178, 103, 0.22) 0%, rgba(178, 111, 53, 0.12) 100%);
            color: #f3dcb0;
        }

        .companion-columns {
            display: grid;
            grid-template-columns: 1.2fr 0.9fr;
            gap: 18px;
        }

        .panel {
            border: 1px solid rgba(227, 181, 106, 0.14);
            border-radius: 16px;
            padding: 16px;
            background: rgba(242, 228, 200, 0.03);
        }

        .panel h3 {
            margin: 0 0 12px;
            font-size: 1rem;
            color: #f3dcb0;
        }

        .panel p {
            color: #b8a186;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .summary-line {
            border-radius: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(227, 181, 106, 0.12);
        }

        .summary-label {
            display: block;
            margin-bottom: 4px;
            color: #b8a186;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .summary-value {
            color: #f2e4c8;
            font-weight: 700;
        }

        .skills-track {
            display: grid;
            gap: 12px;
        }

        .skill-node {
            border-radius: 14px;
            padding: 14px;
            border: 1px solid rgba(227, 181, 106, 0.14);
            background: rgba(18, 11, 8, 0.74);
        }

        .skill-node.unlocked {
            border-color: rgba(227, 181, 106, 0.42);
            background: linear-gradient(180deg, rgba(138, 79, 45, 0.28) 0%, rgba(87, 39, 23, 0.28) 100%);
        }

        .skill-node.available {
            border-color: rgba(227, 181, 106, 0.62);
            box-shadow: 0 0 0 1px rgba(227, 181, 106, 0.2), 0 0 18px rgba(227, 181, 106, 0.14);
        }

        .skill-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
        }

        .skill-name {
            margin: 0 0 6px;
            color: #f3dcb0;
            font-size: 1rem;
        }

        .skill-description {
            margin: 0;
            color: #b8a186;
            line-height: 1.45;
        }

        .skill-state {
            flex-shrink: 0;
            padding: 7px 10px;
            border-radius: 999px;
            background: rgba(242, 228, 200, 0.08);
            color: #f2e4c8;
            font-size: 0.82rem;
        }

        .skill-state.locked {
            color: #de8c68;
        }

        .skill-state.available {
            color: #f3dcb0;
            background: rgba(224, 178, 103, 0.14);
        }

        .skill-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            color: #b8a186;
            font-size: 0.85rem;
        }

        .skill-btn,
        .weapon-btn {
            padding: 9px 14px;
            margin-top: 12px;
        }

        .weapons-list {
            display: grid;
            gap: 10px;
        }

        .weapon-card {
            border-radius: 14px;
            padding: 14px;
            background: rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(227, 181, 106, 0.12);
        }

        .weapon-card h4 {
            margin: 0 0 6px;
            color: #f3dcb0;
        }

        .weapon-card p {
            margin: 0;
            line-height: 1.45;
        }

        .weapon-meta {
            margin-top: 8px;
            color: #debf95;
            font-size: 0.86rem;
        }

        .empty-state {
            text-align: center;
            padding: 36px 20px;
            border: 1px dashed rgba(227, 181, 106, 0.28);
            border-radius: 18px;
            color: #b8a186;
            background: rgba(242, 228, 200, 0.03);
        }

        .toast {
            position: fixed;
            right: 18px;
            bottom: 18px;
            min-width: 260px;
            max-width: 360px;
            padding: 14px 16px;
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(44, 27, 19, 0.96) 0%, rgba(18, 11, 8, 0.98) 100%);
            border: 1px solid rgba(227, 181, 106, 0.35);
            box-shadow: 0 22px 40px rgba(0, 0, 0, 0.34);
            color: #f2e4c8;
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.error {
            border-color: rgba(167, 84, 47, 0.7);
            color: #f4bca4;
        }

        .loading {
            color: #debf95;
            text-align: center;
            padding: 24px;
        }

        @media (max-width: 940px) {
            .companions-header,
            .companion-top,
            .skill-row {
                flex-direction: column;
            }

            .companions-header {
                align-items: flex-start;
            }

            .header-actions,
            .companion-meta {
                justify-content: flex-start;
            }

            .companion-columns {
                grid-template-columns: 1fr;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="companions-shell">
        <header class="companions-header">
            <div class="header-copy">
                <h1>Companions</h1>
                <p>Gerencie a miniárvore dos aliados recrutados e equipe armas próprias para cada classe. O bônus da arma entra no dano do companion durante o combate.</p>
            </div>
            <div class="header-actions">
                <div id="playerLevelChip" class="level-chip">Nv. --</div>
                <a class="nav-link" href="/game">Voltar ao jogo</a>
            </div>
        </header>

        <div id="companionsGrid" class="companions-grid">
            <div class="loading">Carregando companions...</div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let companionsData = [];

        const classLabels = {
            guerreiro: 'Guerreiro',
            mago: 'Mago',
            druida: 'Druida'
        };

        const effectLabels = {
            damage: 'Dano direto',
            damage_guard: 'Dano e guarda',
            damage_freeze: 'Dano e congelamento',
            damage_poison: 'Dano e veneno',
            heal: 'Cura',
            damage_heal: 'Dano e cura'
        };

        async function loadCompanions() {
            const grid = document.getElementById('companionsGrid');
            grid.innerHTML = '<div class="loading">Carregando companions...</div>';

            try {
                const response = await fetch('/api/companions');
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Não foi possível carregar os companions.');
                }

                companionsData = data.companions || [];
                document.getElementById('playerLevelChip').textContent = `Nv. ${data.player_level}`;
                renderCompanions();
            } catch (error) {
                grid.innerHTML = `<div class="empty-state">${error.message}</div>`;
                showToast(error.message, 'error');
            }
        }

        function renderCompanions() {
            const grid = document.getElementById('companionsGrid');

            if (!companionsData.length) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <p>Você ainda não recrutou companions.</p>
                        <p>Converse com sobreviventes na dungeon para liberar esta tela.</p>
                        <a class="nav-link" href="/game">Retornar</a>
                    </div>
                `;
                return;
            }

            grid.innerHTML = companionsData.map((companion) => {
                const classLabel = classLabels[companion.companion_class] || companion.companion_class || 'Companion';
                const totalMinAttack = (companion.attack_min || 0) + (companion.weapon_bonus || 0);
                const totalMaxAttack = (companion.attack_max || 0) + (companion.weapon_bonus || 0);
                const nextUnlock = companion.next_skill_name
                    ? `${companion.next_skill_name} no nível ${companion.next_unlock_level}`
                    : 'Miniárvore completa';

                const skillNodes = (companion.skill_nodes || []).map((skill) => {
                    const stateClass = skill.unlocked ? 'unlocked' : (skill.can_unlock ? 'available' : 'locked');
                    const stateLabel = skill.unlocked
                        ? 'Desbloqueada'
                        : (skill.can_unlock ? 'Disponível' : `Libera no nível ${skill.unlock_level}`);

                    return `
                        <div class="skill-node ${stateClass}">
                            <div class="skill-row">
                                <div>
                                    <h4 class="skill-name">${skill.name}</h4>
                                    <p class="skill-description">${skill.description}</p>
                                </div>
                                <div class="skill-state ${stateClass}">${stateLabel}</div>
                            </div>
                            <div class="skill-meta">
                                <span>Efeito: ${effectLabels[skill.effect] || skill.effect}</span>
                                <span>Recarga: ${skill.cooldown} turnos</span>
                                ${skill.unlocked ? `<span>CD atual: ${skill.current_cooldown}</span>` : ''}
                            </div>
                            ${skill.can_unlock ? `<button class="skill-btn" onclick="unlockCompanionSkill('${companion.id}', '${skill.id}')">Desbloquear habilidade</button>` : ''}
                        </div>
                    `;
                }).join('');

                const availableWeapons = (companion.available_weapons || []).map((weapon) => `
                    <div class="weapon-card">
                        <h4>${weapon.name}</h4>
                        <p>${weapon.description || 'Arma compatível com este companion.'}</p>
                        <div class="weapon-meta">Ataque adicional: +${weapon.attack_bonus}</div>
                        <button class="weapon-btn" onclick="equipWeapon('${companion.id}', ${weapon.index})">Equipar arma</button>
                    </div>
                `).join('');

                return `
                    <section class="companion-card">
                        <div class="companion-top">
                            <div>
                                <h2 class="companion-name">${companion.name}</h2>
                                <div class="companion-title">${companion.title || classLabel}</div>
                                <p class="companion-description">${companion.description || ''}</p>
                            </div>
                            <div class="companion-meta">
                                <div class="meta-chip">Classe: ${classLabel}</div>
                                <div class="meta-chip">Função: ${companion.role || 'apoio'}</div>
                                <div class="meta-chip points">Pontos disponíveis: ${companion.available_points || 0}</div>
                            </div>
                        </div>

                        <div class="companion-columns">
                            <div class="panel">
                                <h3>Miniárvore</h3>
                                <div class="summary-grid">
                                    <div class="summary-line">
                                        <span class="summary-label">Ataque atual</span>
                                        <span class="summary-value">${totalMinAttack} - ${totalMaxAttack}</span>
                                    </div>
                                    <div class="summary-line">
                                        <span class="summary-label">Próximo marco</span>
                                        <span class="summary-value">${nextUnlock}</span>
                                    </div>
                                </div>
                                <div class="skills-track">${skillNodes}</div>
                            </div>

                            <div class="panel">
                                <h3>Equipamento</h3>
                                <div class="summary-grid">
                                    <div class="summary-line">
                                        <span class="summary-label">Arma atual</span>
                                        <span class="summary-value">${companion.weapon_name || 'Nenhuma'}</span>
                                    </div>
                                    <div class="summary-line">
                                        <span class="summary-label">Bônus da arma</span>
                                        <span class="summary-value">+${companion.weapon_bonus || 0}</span>
                                    </div>
                                </div>
                                <h3>Armas compatíveis no inventário</h3>
                                <div class="weapons-list">
                                    ${availableWeapons || '<p>Nenhuma arma compatível no inventário no momento.</p>'}
                                </div>
                            </div>
                        </div>
                    </section>
                `;
            }).join('');
        }

        async function unlockCompanionSkill(companionId, skillId) {
            try {
                const response = await fetch('/api/companions/unlock_skill', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ companion_id: companionId, skill_id: skillId })
                });
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message || 'Não foi possível desbloquear a habilidade.');
                }

                showToast(data.message);
                await loadCompanions();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function equipWeapon(companionId, itemIndex) {
            try {
                const response = await fetch('/api/companions/equip_weapon', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ companion_id: companionId, item_index: itemIndex })
                });
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message || 'Não foi possível equipar a arma.');
                }

                showToast(data.message);
                await loadCompanions();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');

            window.clearTimeout(showToast.timer);
            showToast.timer = window.setTimeout(() => {
                toast.classList.remove('show');
            }, 2400);
        }

        loadCompanions();
    </script>
</body>
</html>
